version: '3.8'

services:
# ============================================================================================================
# POSTGRES + POSTGIS

  postgres:
    image: postgis/postgis:15-3.3  # Uses official PostGIS image
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-runs SQL files in this folder on first startup
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - app_net

# ============================================================================================================
# GRAFANA

  grafana:
    image: grafana/grafana:latest
    container_name: app_grafana
    restart: unless-stopped
    user: "0:0" # Required to read mounted files in some Docker setups
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Point to the internal postgres service
      GF_DATABASE_URL: postgres://postgres:mysecretpassword@postgres:5432/myapp?sslmode=disable
    volumes:
      - ./grafana/grafana-data:/var/lib/grafana # Persistent storage for users/sessions
      - ./grafana/provisioning:/etc/grafana/provisioning # Auto-configs datasources/dashboards
      - ./grafana/dashboard-json:/var/lib/grafana/dashboards # Your JSON dashboard files
    depends_on:
      - postgres
    networks:
      - app_net

volumes:
  pg_data:
  grafana-data:

networks:
  app_net:
    driver: bridge   